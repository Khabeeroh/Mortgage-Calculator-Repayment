<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator Repayment</title>
    <link rel="stylesheet" href="index.css">
    <link rel="font-awesome" href="./fonts/PlusJakartaSans-Italic-VariableFont_wght.ttf">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container mx-auto d-flex justify-content-center align-items-center">

    <div class="row m-0  m-md-3 m-lg-5   bg-white rounded-start-4 ">
        <div class="calculator col-12 col-md-6 p-4  rounded-start-4">
            <div class="d-flex flex-column flex-md-row justify-content-start justify-content-md-between align-items-start align-items-md-center  pb-3">
                <h6>Mortgage Calculator</h6>
                <button type="button" class="btn btn-link p-0" id="clearBtn">Clear All</button>
            </div>

        <form action="" id="mortgage-form" name="mortgage-form">
            <div>
                <label for="amount">Mortgage Amount</label>
                <div class="input-group">
                    <span class="input-group-text" id="basic-addon1">£</span>
                    <input type="text" name="amount" id="amount" class="form-control" aria-label="amount" aria-describedby="basic-addon1" >
                </div>
                <p class="error mb-2" id="amount-error"></p>
            </div>

           <div class="d-flex gap-3">
                <div>
                    <label for="mortgage-term">Mortgage Term</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="mortgage-term" name="mortgage-term" aria-label="mortgage-term" aria-describedby="basic-addon2">
                        <span class="input-group-text" id="basic-addon2">years</span>
                    </div>
                    <p class="error mb-2" id="mortgage-term-error"></p>
                </div>
                <div>
                    <label for="interest-rate">Interest Rate</label>
                    <div class="input-group">
                        <input type="number"  id="interest-rate" name="interest-rate" class="form-control" aria-label="interest-rate" aria-describedby="basic-addon2">
                        <span class="input-group-text" id="basic-addon2">%</span>
                    </div>
                    <p id="interest-rate-error" class="error mb-2"></p>
                </div>
           </div>

           <div>
                <label for="mortgage-type">Mortgage Type</label>
                <div class="repay border mb-2 p-2 rounded  hover">
                    <input class="form-check-input" type="radio" name="mortgage-type" id="repay">
                    <label class="form-check-label" for="repay">Repayment</label>
                </div>
                <div class="interestOnly border p-2 rounded hover">
                    <input class="form-check-input" type="radio" name="mortgage-type" id="interest">
                    <label class="form-check-label" for="interest">Interest Only</label>
                </div>
                <p id="mortgage-type-error" class="error "></p>
           </div>

           <button type="button" id="calculateRepayment" class="mt-2 py-2 px-5 rounded-5  border-0">
                <img src="images/icon-calculator.svg" alt="">
                Calculate Repayment
           </button>

        </form>
            

        </div>
        
        <div class="result col-12 col-md-6 rounded-end-4 p-4" id="result">
            <div class="result-content text-center pt-5">
                <img src="images/illustration-empty.svg" alt="">
                <p class="text-white fs-5">Results shown here</p>
                <p>Complete the form and click "calculate repayments" to see what your monthly repayments would be</p>
            </div>
        </div>
    </div>

</div>
    


    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
